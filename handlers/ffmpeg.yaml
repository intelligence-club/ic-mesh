# FFmpeg — audio/video conversion and processing
capability: ffmpeg
namespace: ffmpeg
aliases: [convert, transcode]
description: "Audio/video conversion via FFmpeg"

detect:
  binary: ffmpeg
  probe_cmd: "ffmpeg -version"

invoke:
  # SECURITY: No eval, no custom commands. Only ffprobe on uploaded files.
  cmd: |
    if [ -f "{input}" ]; then
      ffprobe -v quiet -print_format json -show_format -show_streams "{input}" > "{output_dir}/output.json" 2>&1
      if [ $? -ne 0 ]; then
        echo "Error: ffprobe failed on input file" >&2
        exit 1
      fi
    else
      echo "Error: No input file provided. Upload a file and use the returned URL in payload.url" >&2
      exit 1
    fi
  output: file
  output_file: "{output_dir}/output.json"
  result_type: json

resources:
  timeout: 300
  max_input_mb: 500
  concurrent: 2
