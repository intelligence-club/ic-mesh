# Whisper — Speech-to-text transcription (with auto ffmpeg conversion)
capability: whisper
namespace: whisper.cpp
aliases: [transcription, transcribe, stt]
description: "Speech-to-text via whisper.cpp / whisper-cli"

detect:
  binary: whisper
  fallback_binaries: [whisper-cli, whisper-cpp]

models:
  scan_dirs:
    - ~/.cache/whisper
    - ~/Library/Caches/whisper
    - /usr/local/share/whisper/models
    - ~/.local/share/whisper
  pattern: "ggml-*.bin"
  parse_name: "ggml-(?<name>.+)\\.bin"

invoke:
  # SECURITY: model_name is shell-escaped by handler-loader. Only safe chars allowed.
  cmd: "ffmpeg -y -i \"{input}\" -ar 16000 -ac 1 \"{output_dir}/audio.wav\" -loglevel error && whisper \"{output_dir}/audio.wav\" --model \"{model_name}\" --output_dir \"{output_dir}\" --output_format txt --language en --threads {threads} 2>&1 && find \"{output_dir}\" -name '*.txt' -exec cat {} \\;"
  output: stdout
  result_type: text

resources:
  timeout: 600
  max_input_mb: 500
  min_ram_mb: 1024
  concurrent: 1

benchmark:
  expected_output: "the quick brown fox jumps over the lazy dog"
  match_threshold: 0.7
  timeout: 30
