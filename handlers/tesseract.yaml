# Tesseract — OCR / text extraction from images
capability: tesseract
namespace: tesseract
aliases: [ocr, pdf-extract]
description: "OCR text extraction via Tesseract"

detect:
  binary: tesseract
  probe_cmd: "tesseract --version"

invoke:
  cmd: |
    LANG_FLAG=""
    if tesseract --list-langs 2>&1 | grep -q eng; then
      LANG_FLAG="-l eng"
    fi
    tesseract "{input}" "{output_dir}/output" $LANG_FLAG 2>&1 || {
      echo "Error: tesseract failed. Ensure input is a valid image (PNG, JPG, TIFF, BMP)." >&2
      exit 1
    }
  output: file
  output_file: "{output_dir}/output.txt"
  result_type: text

resources:
  timeout: 120
  max_input_mb: 50
  concurrent: 2
