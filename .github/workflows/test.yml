name: Test Suite

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm ci
    - name: Smoke test
      run: |
        mkdir -p /tmp/ic-mesh-test/uploads
        node server.js &
        sleep 5
        curl -sf http://localhost:8333/status && echo "✅ Server OK"
        curl -sf http://localhost:8333/nodes && echo "✅ Nodes OK"
        kill %1 || true
      env:
        NODE_ENV: test
        DATA_DIR: /tmp/ic-mesh-test
        PORT: 8333
        STRIPE_API_KEY: sk_test_dummy
